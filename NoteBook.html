<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTOM Digital Notebook</title>
  <link rel="stylesheet" href="NoteBook.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
  />
</head>
<body>
  <div class="notebook">
    <div class="header">
      <h1 contenteditable="true" class="page-title">Untitled</h1>
      <div class="date-day">
        <span>Date <input type="date" id="date-input" /></span>
        <span>Day <input type="text" id="day-input" readonly /></span>
      </div>
    </div>

    <div class="content" id="notebook-content" contenteditable="true" spellcheck="false"></div>

    <div class="footer">
      <button id="prev-page"><i class="fas fa-arrow-left"></i> Previous</button>
      <div class="page-number">1</div>
      <button id="next-page">Next <i class="fas fa-arrow-right"></i></button>
    </div>

    <div class="save-wrapper">
      <button id="save-page">💾 Save Page</button>
    </div>
  </div>

  <!-- Floating Ball Toolbar -->
  <div class="floating-ball" id="floating-ball">
    <div class="ball-main" id="ball-main">
      <i class="fas fa-pen"></i>
    </div>
    <div class="ball-options">
      <select id="font-select" class="ball-option" title="Font">
        <option value="Arial" selected>Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Verdana">Verdana</option>
      </select>
      <select id="font-size-select" class="ball-option" title="Font Size">
        <option value="2">Small</option>
        <option value="3" selected>Normal</option>
        <option value="4">Large</option>
        <option value="5">Extra Large</option>
      </select>
      <button class="ball-option" data-command="bold" title="Bold"><i class="fas fa-bold"></i></button>
      <button class="ball-option" data-command="italic" title="Italic"><i class="fas fa-italic"></i></button>
      <button class="ball-option" data-command="underline" title="Underline"><i class="fas fa-underline"></i></button>
      <input type="color" class="ball-option color-picker" id="text-color" title="Text Color" />
      <input type="color" class="ball-option color-picker" id="highlight-color" title="Highlight Color" />
      <button class="ball-option" data-command="insertUnorderedList" title="Bullet List"><i class="fas fa-list-ul"></i></button>
      <button class="ball-option" data-command="insertOrderedList" title="Numbered List"><i class="fas fa-list-ol"></i></button>
      <button class="ball-option" data-command="undo" title="Undo"><i class="fas fa-undo"></i></button>
      <button class="ball-option" data-command="redo" title="Redo"><i class="fas fa-redo"></i></button>
    </div>
  </div>

  <script src="NoteBook.js"></script>
</body>
</html>
